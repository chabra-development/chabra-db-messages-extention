<!DOCTYPE html>
<html lang="pt-BR">
<head>

</head>
<body>

    <img src="../icons/icon48.png" alt="" width="20" height="20" />
    <h1>Chabra Tags</h1>

  <main>
    <p class="hint dim" id="checking">Verificando...</p>

    <section id="no-portal" hidden>
      <p class="hint">

      </p>

    <section id="contact-section" hidden>
      <div class="info-row">
        <span class="label">Contato ativo</span>
        <span class="value" id="contact-display">—</span>
      </div>
    </section>
  </main>

  <footer>
    <span>v1.0.0</span>
    <a href="https://chabra-db-messages.vercel.app" target="_blank">API</a>
  </footer>

  <script src="popup.js"></script>

</html>
